<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .image-banner {
        width: 100%;                  /* Given width */
        height: 350px;                 /* Given height */
        background-image: url('https://picsum.photos/1200/350'); 
        background-size: cover;        /* Scales the image to fit */
        background-position: center;   /* Centers the image background */
    }
</style>
</head>
<body>
    <div class="image-banner"></div>
</body>
</html>
