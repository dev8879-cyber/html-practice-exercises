<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card container">
            <img src="WhatsApp Image 2026-05-28 at 20.17.46.jpeg" alt="Picture" class="Card-image">
        </div>
        <div class="Card-content">
            <div class="Card-tags">
                <span class="tag">Nature</span>
                <span class="tag">Lake</span>
            </div>

            <h2 class="">Image-logo</h2>

            <p class="Card-content">
                Lorem ipsum dolor sit, amet consectetur adipisicing elit. Culpa ut, voluptatem, delectus, inventore et optio doloremque obcaecati esse fugit officiis illo corporis iusto temporibus debitis eum officia quibusdam commodi sequi. Sequi delectus quae fugiat.
            </p>

            <div class="button">
                <button class="card-btn">Read More</button>
            </div>
        </div>
    </div>
</body>
</html>
