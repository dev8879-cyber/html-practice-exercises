<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation Booking</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <h2>Book your vacation</h2>
    <form action="#" method="POST"> <!-- '#': Keeps user on the same page after filling details. 'method="POST"':sends data in a secure manner.̉-->
        <label for="name">Name:</label><br>
        <input type="text" id=""name" required> <br> <br>
        <label for="destination">Destination</label><br>
        <select id="destination">
            <option>Paris</option>
            <option>Tokyo</option>
            <option>Maldives</option>
        </select> <br> <br>

        <label for="date">Travel Date:</label><br>
        <input type="date" id="date" required><br><br>

        <input type="submit" value="Book Now">
    </form>
</body>
</html>
