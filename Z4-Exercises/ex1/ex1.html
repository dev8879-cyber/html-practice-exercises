<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Video</title>
</head>
<body>
    <h2>Embedded Local Video</h2>
    <!-- Controls attribute adds play/pause buttons -->
    <video width="600" controls>
        <source src="video.mp4" type="video/mp4">
    </video>
</body>
</html>
