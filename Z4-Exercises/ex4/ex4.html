<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricket Scorecard</title>
</head>
<body>
    <h2>Match Score Table</h2>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Player Name</th>
                <th>Runs</th>
                <th>Balls</th>
                <th>4s</th>
                <th>6s</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Player A</td>
                <td>82</td>
                <td>54</td>
                <td>6</td>
                <td>3</td>
            </tr>
            <tr>
                <td>Player B</td>
                <td>45</td>
                <td>30</td>
                <td>4</td>
                <td>1</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
